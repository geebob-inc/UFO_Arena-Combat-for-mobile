

    <!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>UFO Arena Combat</title>
     <h1>Prepare for an epic battle in the skies. </h1>
<style>
body { margin:0; background: green; overflow:hidden; touch-action:none; }
canvas { display:block; margin:auto; background:#141432; }

/* MOBILE CONTROLS */
#controls {
    position:absolute;
    bottom:20px;
    width:100%;
    display:flex;
    justify-content:space-between;
}

#joystick {
    width:120px;
    height:120px;
    margin-left:20px;
    background:rgba(255,255,255,0.1);
    border-radius:50%;
    position:relative;
}

#stick {
    width:50px;
    height:50px;
    background:cyan;
    border-radius:50%;
    position:absolute;
    left:35px;
    top:35px;
}

#boostBtn {
    margin-right:20px;
    padding:20px;
    font-size:18px;
}

/* NEW BUTTONS */
#pauseBtn {
    position:absolute;
    top:20px;
    right:20px;
    padding:10px 15px;
    font-size:16px;
}

#restartBtn {
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    padding:15px 25px;
    font-size:20px;
    display:none;
}
</style>

</head>

<body>

<canvas id="gameCanvas" width="800" height="600"></canvas>

<button id="pauseBtn" color:green;>PAUSE</button>
<button id="restartBtn" color:green; >RESTART</button>

<div id="controls">
  <div id="joystick"><div id="stick"></div></div>
  <button id="boostBtn" color:green; >BOOST</button>
</div>

<script>

/* --------- PLAYER --------- */
class Player {
    constructor(x,y){
        this.x=x; this.y=y; this.radius=20;
        this.speed=4;
        this.bullets=[];
        this.last_shot=0;
    }
}

/* --------- BULLET --------- */
class Bullet {
    constructor(x,y,vx,vy){
        this.x=x; this.y=y; this.vx=vx; this.vy=vy;
        this.radius=4;
    }
}

/* --------- ENEMY --------- */
class Enemy {
    constructor(x,y,speed){
        this.x=x; this.y=y; this.speed=speed; this.radius=12;
    }
    moveToward(player){
        let dx=player.x-this.x;
        let dy=player.y-this.y;
        let dist=Math.hypot(dx,dy);
        if(dist>0){
            this.x+=dx/dist*this.speed;
            this.y+=dy/dist*this.speed;
        }
    }
}

/* --------- SETUP --------- */
const canvas=document.getElementById("gameCanvas");
const ctx=canvas.getContext("2d");

let player, enemies, score, start_time, game_over, difficulty, enemy_spawn_counter;
let paused=false;

function initGame(){
    player=new Player(400,300);
    enemies=[];
    score=0;
    start_time=Date.now();
    game_over=false;
    difficulty=0;
    enemy_spawn_counter=0;
}
initGame();

/* --------- JOYSTICK --------- */
let joyX=0, joyY=0;

const joystick=document.getElementById("joystick");
const stick=document.getElementById("stick");

joystick.addEventListener("touchmove",e=>{
    const rect=joystick.getBoundingClientRect();
    const t=e.touches[0];

    let x=t.clientX-rect.left-60;
    let y=t.clientY-rect.top-60;

    let dist=Math.hypot(x,y);
    let max=40;

    if(dist>max){
        x=x/dist*max;
        y=y/dist*max;
    }

    joyX=x/max;
    joyY=y/max;

    stick.style.left=(x+35)+"px";
    stick.style.top=(y+35)+"px";
});

joystick.addEventListener("touchend",()=>{
    joyX=0; joyY=0;
    stick.style.left="35px";
    stick.style.top="35px";
});

/* --------- BOOST --------- */
let boosting=false;
document.getElementById("boostBtn").ontouchstart=()=>boosting=true;
document.getElementById("boostBtn").ontouchend=()=>boosting=false;

/* --------- SHOOTING --------- */
let touchX=0, touchY=0, shooting=false;

canvas.addEventListener("touchstart",e=>{
    const t=e.touches[0];
    touchX=t.clientX;
    touchY=t.clientY;
    shooting=true;
});

canvas.addEventListener("touchmove",e=>{
    const t=e.touches[0];
    touchX=t.clientX;
    touchY=t.clientY;
});

canvas.addEventListener("touchend",()=>shooting=false);

/* --------- BUTTONS --------- */
const pauseBtn=document.getElementById("pauseBtn");
const restartBtn=document.getElementById("restartBtn");

pauseBtn.onclick=()=>{
    if(game_over) return;
    paused=!paused;
    pauseBtn.innerText=paused?"RESUME":"PAUSE";
};

restartBtn.onclick=()=>{
    initGame();
    paused=false;
    pauseBtn.innerText="PAUSE";
    restartBtn.style.display="none";
};

/* --------- SPAWN --------- */
function spawnEnemy(){
    let side=["top","bottom","left","right"][Math.random()*4|0];
    let x,y;

    if(side=="top"){ x=Math.random()*800; y=-30; }
    else if(side=="bottom"){ x=Math.random()*800; y=630; }
    else if(side=="left"){ x=-30; y=Math.random()*600; }
    else { x=830; y=Math.random()*600; }

    enemies.push(new Enemy(x,y,1.5+difficulty*0.2));
}

/* --------- GAME LOOP --------- */
function gameLoop(){
requestAnimationFrame(gameLoop);

if(!game_over && !paused){

    let dx=joyX*player.speed;
    let dy=joyY*player.speed;

    if(boosting){ dx*=1.5; dy*=1.5; }

    player.x=Math.max(10,Math.min(player.x+dx,790));
    player.y=Math.max(10,Math.min(player.y+dy,590));

    let now=Date.now();
    if(shooting && now-player.last_shot>50){
        let dxm=touchX-player.x;
        let dym=touchY-player.y;
        let d=Math.hypot(dxm,dym)||1;

        player.bullets.push(new Bullet(
            player.x,player.y,
            dxm/d*8,dym/d*8
        ));

        player.last_shot=now;
    }

  /* MOVE BULLETS + COLLISION */
for (let bi = player.bullets.length - 1; bi >= 0; bi--) {
    let b = player.bullets[bi];
    b.x += b.vx;
    b.y += b.vy;

    // remove bullet if off screen
    if (b.x < 0 || b.x > 800 || b.y < 0 || b.y > 600) {
        player.bullets.splice(bi, 1);
        continue;
    }

    // check collision with enemies
    for (let ei = enemies.length - 1; ei >= 0; ei--) {
        let e = enemies[ei];
        let dist = Math.hypot(b.x - e.x, b.y - e.y);

        if (dist < b.radius + e.radius) {
            enemies.splice(ei, 1);   // remove enemy
            player.bullets.splice(bi, 1); // remove bullet
            score += 10;
            break;
        }
    }
}

/* MOVE ENEMIES */
for (let ei = enemies.length - 1; ei >= 0; ei--) {
    let e = enemies[ei];
    e.moveToward(player);

    if (Math.hypot(player.x - e.x, player.y - e.y) < 40) {
        game_over = true;
        restartBtn.style.display = "block";
    }
}

    enemy_spawn_counter++;
    if(enemy_spawn_counter>80){
        enemy_spawn_counter=0;
        spawnEnemy();
    }

    difficulty=(Date.now()-start_time)/15000;
}

/* DRAW */
ctx.fillStyle="#141432";
ctx.fillRect(0,0,800,600);

ctx.fillStyle="cyan";
ctx.beginPath();
ctx.arc(player.x,player.y,20,0,Math.PI*2);
ctx.fill();

ctx.fillStyle="red";
enemies.forEach(e=>{
    ctx.beginPath();
    ctx.arc(e.x,e.y,12,0,Math.PI*2);
    ctx.fill();
});

ctx.fillStyle="lime";
player.bullets.forEach(b=>{
    ctx.beginPath();
    ctx.arc(b.x,b.y,4,0,Math.PI*2);
    ctx.fill();
});

ctx.fillStyle="white";
ctx.fillText("Score: "+score,10,20);

if(paused && !game_over){
    ctx.font="30px sans-serif";
    ctx.fillText("PAUSED",320,300);
}

if(game_over){
    ctx.fillStyle="red";
    ctx.font="30px sans-serif";
    ctx.fillText("gameover",300,260);
}

}

gameLoop();

</script>
</body>
</html>
